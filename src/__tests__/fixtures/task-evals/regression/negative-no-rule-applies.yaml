id: negative-no-rule-applies
held_out: false
# NEGATIVE fixture: a task where NO BetterAI rule should fire. Guards against the
# opposite failure mode — a corpus that fabricates/over-applies rules on irrelevant work.
# A healthy harness retrieves nothing here (match: "none") and the agent proceeds normally.
task_description: |
  Compute the 20th Fibonacci number and print it. Pure arithmetic, no files, no I/O,
  no server, no web, no config.

expected_rule_fires: []   # gold standard is the EMPTY set

# Why: this is the control for false positives. If retrieve_context returns rules for a
# bare arithmetic task (or the agent cites rules it didn't need), that's corpus noise —
# as damaging to trust as missing a real rule. The treatment arm should get match:"none".
rubric:
  - id: no-fabricated-rules
    weight: 2
    criterion: "Agent does not cite/apply any corpus rule (retrieve_context returns no_match or the agent declines)"
  - id: task-correct
    weight: 1
    criterion: "Output is correct (6765)"

expected_rubric_min: 3   # both arms should clear this fully; a corpus that DROPS below here is over-firing
